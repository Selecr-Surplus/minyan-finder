          --amber:#D9A441; --sage:#8FBCA9; --clay:#C0654F;
          --line:rgba(242,232,213,.12);
        }
        *{box-sizing:border-box;margin:0}
        .app{min-height:100vh;background:
          radial-gradient(1200px 500px at 70% -10%, #243B5E 0%, transparent 60%),
          var(--ink);
          color:var(--parch); font-family:'Inter',system-ui,sans-serif;
          padding:20px 14px 56px; max-width:560px; margin:0 auto;}
        h1{font-family:'Frank Ruhl Libre',serif;font-weight:900;font-size:1.7rem;
           letter-spacing:.01em; line-height:1.1}
        .sub{color:var(--parch-dim);font-size:.8rem;margin-top:4px}
        .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
        .chip{border:1px solid var(--line);background:var(--panel);color:var(--parch);
          border-radius:999px;padding:6px 12px;font-size:.78rem;cursor:pointer;font-family:inherit}
        .chip.on{background:var(--amber);color:#241A06;border-color:var(--amber);font-weight:600}
        .geo{color:var(--amber);font-size:.75rem;min-height:1em;margin-top:4px}
        .freshness{color:var(--parch-dim);font-size:.66rem;margin-top:6px;opacity:.85;
          font-family:'IBM Plex Mono',monospace}
        /* --- day navigator --- */
        .daynav{display:flex;align-items:center;gap:10px;margin-top:14px}
        .dbtn{width:38px;height:38px;border-radius:12px;border:1px solid var(--line);
          background:var(--panel);color:var(--parch);font-size:1.3rem;cursor:pointer;
          line-height:1;font-family:inherit}
        .dbtn:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
        .dlabel{min-width:140px;text-align:center}
        .dlabel b{display:block;font-family:'Frank Ruhl Libre',serif;font-size:1.05rem}
        .dlabel span{font-size:.72rem;color:var(--parch-dim)}
        .todayBtn{margin-left:auto}
        /* --- day arc (signature) --- */
        .arc{margin:18px 0 6px;position:relative;height:64px}
        .band{position:absolute;left:0;right:0;top:26px;height:10px;border-radius:6px;
          background:linear-gradient(90deg,#3C5A8A 0%,#7FA8D9 12%,#E8D9A8 40%,
          #E8B96A 70%,#B96A4E 82%,#3A2E52 92%,#141C30 100%);}
        .tick{position:absolute;top:18px;width:2px;height:26px;background:var(--parch);
          opacity:.85;transform:translateX(-1px)}
        .tick label,.tickLabel{position:absolute;top:46px;transform:translateX(-50%);
          font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--parch-dim);
          white-space:nowrap}
        .tickName{position:absolute;top:2px;transform:translateX(-50%);
          font-size:.6rem;color:var(--parch-dim);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
        .needle{position:absolute;top:14px;width:0;height:0;transform:translateX(-7px);
          border-left:7px solid transparent;border-right:7px solid transparent;
          border-top:10px solid var(--amber);filter:drop-shadow(0 0 6px rgba(217,164,65,.8))}
        @media (prefers-reduced-motion:no-preference){
          .needle{animation:pulse 2.4s ease-in-out infinite}
          @keyframes pulse{50%{filter:drop-shadow(0 0 12px rgba(217,164,65,1))}}
        }
        /* --- zman chips --- */
        .zrow{display:flex;gap:6px;flex-wrap:wrap;margin:14px 0 4px}
        .z{background:var(--panel);border:1px solid var(--line);border-radius:10px;
          padding:6px 10px;text-align:center;flex:1;min-width:70px}
        .z b{display:block;font-family:'IBM Plex Mono',monospace;font-size:.85rem;color:var(--parch)}
        .z span{font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--parch-dim)}
        .z.hot{border-color:var(--amber)} .z.hot b{color:var(--amber)}
        /* --- tabs --- */
        .tabs{display:flex;gap:6px;margin:18px 0 12px}
        .tab{flex:1;padding:10px 0;border-radius:12px;border:1px solid var(--line);
          background:var(--panel);color:var(--parch-dim);font-family:'Frank Ruhl Libre',serif;
          font-weight:700;font-size:1rem;cursor:pointer}
        .tab.on{background:var(--parch);color:var(--ink);border-color:var(--parch)}
        .tab:focus-visible,.chip:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
        /* --- next card --- */
        .next{background:linear-gradient(135deg,var(--panel2),var(--panel));
          border:1px solid var(--amber);border-radius:16px;padding:14px;margin-bottom:14px}
        .next .when{font-family:'IBM Plex Mono',monospace;font-size:1.6rem;color:var(--amber);font-weight:600}
        .next .name{font-family:'Frank Ruhl Libre',serif;font-weight:700;font-size:1.15rem;margin-top:2px}
        .next .meta{color:var(--parch-dim);font-size:.78rem;margin-top:4px}
        .leave{display:inline-block;margin-top:8px;background:var(--amber);color:#241A06;
          border-radius:8px;padding:4px 10px;font-weight:600;font-size:.78rem}
        /* --- list --- */
        .card{display:flex;gap:12px;align-items:flex-start;background:var(--panel);
          border:1px solid var(--line);border-radius:14px;padding:11px 12px;margin-bottom:8px}
        .card.past{opacity:.42}
        .t{font-family:'IBM Plex Mono',monospace;font-size:1rem;min-width:74px;color:var(--parch)}
        .t small{display:block;font-size:.6rem;color:var(--parch-dim)}
        .nm{font-weight:600;font-size:.92rem}
        .ad{color:var(--parch-dim);font-size:.74rem;margin-top:1px}
        .badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
        .badge{font-size:.6rem;border-radius:6px;padding:2px 6px;letter-spacing:.03em}
        .badge-dim{background:rgba(242,232,213,.1);color:var(--parch-dim)}
        .badge-gold{background:rgba(217,164,65,.18);color:var(--amber)}
        .badge-sage{background:rgba(143,188,169,.16);color:var(--sage)}
        .badge-clay{background:rgba(192,101,79,.2);color:#E09880}
        .dist{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:.72rem;
          color:var(--parch-dim);white-space:nowrap;padding-top:2px}
        .sect{font-family:'Frank Ruhl Libre',serif;color:var(--parch-dim);font-size:.85rem;
          margin:16px 0 8px;border-bottom:1px solid var(--line);padding-bottom:4px}
        .note{background:rgba(217,164,65,.08);border:1px solid rgba(217,164,65,.3);
          border-radius:12px;padding:10px 12px;font-size:.78rem;color:var(--parch);margin:10px 0}
        .ghost{background:none;border:none;color:var(--parch-dim);font-size:.78rem;
          cursor:pointer;text-decoration:underline;padding:8px 0;font-family:inherit}
        .legend{color:var(--parch-dim);font-size:.68rem;line-height:1.6;margin-top:20px;
          border-top:1px solid var(--line);padding-top:10px}
        /* --- region bar --- */
        .regionbar{margin-top:12px}
        .rblabel{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--parch-dim)}
        .rbchips{display:flex;gap:6px;overflow-x:auto;padding:6px 0 2px;-webkit-overflow-scrolling:touch}
        .rbchips .chip{white-space:nowrap;flex:0 0 auto}
        /* --- distance (within X mi) add-on --- */
        .radiusbar{display:flex;align-items:center;gap:8px;margin:4px 0 2px;flex-wrap:wrap}
        .radiusbar .rblabel{flex:0 0 auto}
        .radiusbar .rbchips{flex:1 1 auto}
        .rbcount{flex:0 0 auto;font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--parch-dim)}
        /* --- fallback (geo-routed) panel --- */
        .fallback{background:linear-gradient(135deg,var(--panel2),var(--panel));
          border:1px solid var(--amber);border-radius:16px;padding:14px;margin:14px 0}
        .fbtitle{font-family:'Frank Ruhl Libre',serif;font-weight:700;font-size:1.15rem;color:var(--amber)}
        .fbsub{color:var(--parch-dim);font-size:.76rem;margin-top:4px;line-height:1.5}
        .fblinks{display:flex;flex-direction:column;gap:8px;margin-top:12px}
        .fbbtn{display:flex;justify-content:space-between;align-items:center;
          background:var(--panel);border:1px solid var(--line);border-radius:10px;
          padding:11px 13px;color:var(--parch);text-decoration:none;font-size:.86rem;font-weight:500}
        .fbbtn:hover{border-color:var(--amber)}
        .fbarrow{color:var(--amber);font-size:1rem;margin-left:10px}
        .liveattrib{color:var(--parch-dim);font-size:.66rem;margin:10px 0 4px;
          font-family:'IBM Plex Mono',monospace;line-height:1.5}
        /* --- verification badge --- */
        .verify{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:8px 0 2px;
          font-size:.68rem;color:var(--parch-dim);font-family:'IBM Plex Mono',monospace}
        .vdot{width:8px;height:8px;border-radius:50%;background:var(--parch-dim);flex:0 0 auto}
        .vdot.ok{background:var(--sage)} .vdot.warn{background:var(--amber)}
        .vdot.run{animation:vpulse 1s ease-in-out infinite}
        @keyframes vpulse{50%{opacity:.25}}
        .vtext{flex:1 1 auto;min-width:0}
        .vlink{background:none;border:none;color:var(--amber);font-size:.68rem;cursor:pointer;
          text-decoration:underline;font-family:inherit;padding:0}
        .vlink:disabled{opacity:.5;cursor:default;text-decoration:none}
        .vreport{flex-basis:100%;background:var(--panel);border:1px solid var(--line);
          border-radius:8px;padding:8px 10px;margin-top:4px;font-size:.66rem;line-height:1.7;color:var(--parch)}
        .gdsub{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--amber);
          opacity:.85;margin-top:3px}
        .comsrc{font-size:.7rem;color:var(--parch-dim);margin:6px 0 2px;
          font-family:'IBM Plex Mono',monospace}
        .comsrc a{color:var(--amber);text-decoration:none}
        /* --- major shuls (authoritative, from own site) --- */
        .majorshul{display:block;background:var(--panel);border:1px solid rgba(217,164,65,.28);
          border-radius:12px;padding:11px 12px;margin-bottom:8px;text-decoration:none;color:var(--parch)}
        .majorshul:hover{border-color:var(--amber)}
        .msarrow{color:var(--amber)}
        .mssh{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--amber);margin-top:4px}
        .msver{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--sage);margin-top:5px}
